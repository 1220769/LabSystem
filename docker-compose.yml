services:
  mongo:
    image: mongo:7
    container_name: labsystem-mongo
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db
    environment:
      MONGO_INITDB_DATABASE: labsystem
    networks:
      - labnet

  server:
    build: ./server
    container_name: labsystem-server
    restart: unless-stopped
    depends_on:
      - mongo
    environment:
      MONGO_URI: mongodb://mongo:27017/labsystem
      JWT_SECRET: ${JWT_SECRET:-labsystem-secret-change-in-prod}
      PORT: 4000
      CORS_ORIGIN: http://localhost
    networks:
      - labnet

  client:
    build: ./client
    container_name: labsystem-client
    restart: unless-stopped
    depends_on:
      - server
    ports:
      - "80:80"
    networks:
      - labnet

volumes:
  mongo-data:

networks:
  labnet:
    driver: bridge
